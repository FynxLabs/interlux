<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .now-cell {
      animation: ilx-calendar-now 1.6s ease-in-out infinite;
      transform-origin: 8px 10px;
    }
    @keyframes ilx-calendar-now {
      0%, 100% { opacity: 0.55; transform: scale(0.85); }
      50%      { opacity: 1; transform: scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .now-cell { animation: none; opacity: 0.9; transform: none; }
    }
  </style>
  <rect x="2" y="3" width="12" height="11" rx="1"/>
  <path d="M2 6.5h12"/>
  <path d="M5 2v2.5M11 2v2.5"/>
  <circle class="now-cell" cx="8" cy="10" r="1.25" fill="var(--ilx-accent, #5a9470)" stroke="none"/>
</svg>
