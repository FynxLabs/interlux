<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .charge-fill-v {
      transform-origin: 8px 14.25px;
      animation: ilx-charge-pulse-v 3s ease-in-out infinite;
    }
    @keyframes ilx-charge-pulse-v {
      0%   { transform: scaleY(var(--ilx-battery-level, 0.1)); }
      100% { transform: scaleY(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .charge-fill-v { animation: none; transform: scaleY(var(--ilx-battery-level, 0.5)); }
    }
  </style>
  <rect x="2.5" y="2" width="11" height="13.5" rx="1.25"/>
  <path d="M6.5 1H9.5" stroke-width="1.5"/>
  <rect class="charge-fill-v"
        x="3.75" y="3.25" width="8.5" height="11" rx="0.3"
        fill="var(--ilx-battery-fill, currentColor)"
        stroke="none"/>
  <path d="M9 8 L10.9 8 L7 14 L7 9.6 L5.1 9.6 L9 3.6 Z"
        fill="var(--ilx-bg, #161618)"
        stroke="currentColor"
        stroke-width="0.7"
        stroke-linejoin="miter"/>
</svg>
