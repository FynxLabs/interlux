<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .critical-fill {
      transform-origin: 2.25px 8px;
      transform: scaleX(0.12);
      animation: ilx-battery-critical 1.2s ease-in-out infinite;
    }
    @keyframes ilx-battery-critical {
      0%, 100% { transform: scaleX(0.08); opacity: 1; }
      50%      { transform: scaleX(0.18); opacity: 0.7; }
    }
    @media (prefers-reduced-motion: reduce) {
      .critical-fill { animation: none; transform: scaleX(0.12); opacity: 1; }
    }
  </style>
  <rect x="1" y="4" width="12" height="8" rx="1.25"/>
  <path d="M14 6.5v3" stroke-width="1.5"/>
  <!--
    Static SVG-attribute transform mirrors the CSS `.critical-fill`
    rule (scaleX(0.12) around x=2.25, y=8) so renderers without CSS
    transform support (e.g. librsvg) still display the critical-low
    state instead of a full red bar. The CSS rule above wins in
    browsers because the CSS `transform` property has higher
    specificity than the SVG attribute.
  -->
  <rect class="critical-fill"
        x="2.25" y="5.25" width="9.5" height="5.5" rx="0.3"
        fill="var(--ilx-error, #8d161e)"
        stroke="none"
        transform="matrix(0.12 0 0 1 1.98 0)"/>
</svg>
