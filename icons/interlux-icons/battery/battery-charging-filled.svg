<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .charge-fill {
      transform-origin: 2.25px 8px;
      animation: ilx-charge-pulse 3s ease-in-out infinite;
    }
    @keyframes ilx-charge-pulse {
      0%   { transform: scaleX(var(--ilx-battery-level, 0.1)); }
      100% { transform: scaleX(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .charge-fill { animation: none; transform: scaleX(var(--ilx-battery-level, 0.5)); }
    }
  </style>
  <rect x="1" y="4" width="12" height="8" rx="1.25"/>
  <path d="M14 6.5v3" stroke-width="1.5"/>
  <rect class="charge-fill"
        x="2.25" y="5.25" width="9.5" height="5.5" rx="0.3"
        fill="var(--ilx-battery-fill, currentColor)"
        stroke="none"/>
  <path d="M8.5 4.25 L5 8.25 L7 8.25 L5.75 11.75 L9.5 7.5 L7.5 7.5 L8.5 4.25 Z"
        fill="var(--ilx-bolt-color, #fabd2f)"
        stroke="var(--ilx-bolt-outline, var(--ilx-bg, #161618))"
        stroke-width="0.7"
        stroke-linejoin="miter"/>
</svg>
