<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .dot-left {
      animation: ilx-bt-left 1.6s ease-in-out infinite;
    }
    .dot-right {
      animation: ilx-bt-right 1.6s ease-in-out infinite;
      animation-delay: 0.8s;
    }
    @keyframes ilx-bt-left {
      0%, 100% { opacity: 0.25; transform: translateX(0); }
      50%      { opacity: 1; transform: translateX(0.5px); }
    }
    @keyframes ilx-bt-right {
      0%, 100% { opacity: 0.25; transform: translateX(0); }
      50%      { opacity: 1; transform: translateX(-0.5px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .dot-left, .dot-right { animation: none; opacity: 0.6; transform: none; }
    }
  </style>
  <path d="M5.5 5l5 6L8 13.5v-11L10.5 5l-5 6"/>
  <circle class="dot-left" cx="2" cy="8" r="0.85" fill="currentColor" stroke="none"/>
  <circle class="dot-right" cx="14" cy="8" r="0.85" fill="currentColor" stroke="none"/>
</svg>
