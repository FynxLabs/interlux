<!--
  Wifi with composited warning badge.
  Glyph color follows --ilx-warning-mode:
    color: glyph recolors to warning, no badge
    badge: glyph stays text color, badge shows
    both:  glyph recolors AND badge shows (default for max clarity)

  Set --ilx-warning-mode on a parent element to switch:
    .my-host { --ilx-warning-mode: badge; }
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25">
  <style>
    .ilx-glyph { stroke: var(--ilx-warning, #c97e2a); }
    .ilx-glyph circle { fill: var(--ilx-warning, #c97e2a); }
    .ilx-badge { display: block; }
  </style>
  <g class="ilx-glyph">
    <path d="M1.5 6.5a10 10 0 0 1 13 0"/>
    <path d="M3.5 9a7 7 0 0 1 9 0"/>
    <path d="M5.5 11.5a4 4 0 0 1 5 0"/>
    <circle cx="8" cy="13.5" r="0.75" stroke="none"/>
  </g>
  <g class="ilx-badge">
    <circle cx="13.25" cy="2.75" r="2.5" fill="var(--ilx-warning, #c97e2a)" stroke="var(--ilx-bg, #161618)" stroke-width="0.6"/>
    <path d="M13.25 1.65v1.6" stroke="var(--ilx-bg, #161618)" stroke-width="0.85"/>
    <circle cx="13.25" cy="3.95" r="0.35" fill="var(--ilx-bg, #161618)" stroke="none"/>
  </g>
</svg>
